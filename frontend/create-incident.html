i<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Incident</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Create Incident</h1>
    </header>

    <div class="container">
        <div class="top-actions">
            <h2>New Incident</h2>
            <a href="index.html" class="btn">Back to Dashboard</a>
        </div>

        <div id="messageBox"></div>

        <form id="incidentForm">
            <div>
                <label for="title">Title</label>
                <input type="text" id="title" required>
            </div>

            <div>
                <label for="description">Description</label>
                <textarea id="description" required></textarea>
            </div>

            <div>
                <label for="severity">Severity</label>
                <select id="severity" required>
                    <option value="">Select severity</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>
            </div>

            <div>
                <label for="category">Category</label>
                <select id="category" required>
                    <option value="">Select category</option>
                    <option value="Application">Application</option>
                    <option value="Database">Database</option>
                    <option value="Server">Server</option>
                    <option value="Network">Network</option>
                    <option value="Security">Security</option>
                </select>
            </div>

            <div>
                <label for="createdBy">Created By</label>
                <input type="text" id="createdBy" value="Vishwanath" required>
            </div>

            <button type="submit">Create Incident</button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById("incidentForm").addEventListener("submit", async function(e) {
            e.preventDefault();

            const messageBox = document.getElementById("messageBox");

            const payload = {
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                severity: document.getElementById("severity").value,
                category: document.getElementById("category").value,
                createdBy: document.getElementById("createdBy").value
            };

            try {
                const response = await fetch(`${API_BASE_URL}/incidents`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.innerHTML = `<div class="message success">Incident created successfully.</div>`;
                    document.getElementById("incidentForm").reset();
                    document.getElementById("createdBy").value = "Vishwanath";
                } else {
                    messageBox.innerHTML = `<div class="message error">${data.message || "Failed to create incident."}</div>`;
                }
            } catch (error) {
                console.error(error);
                messageBox.innerHTML = `<div class="message error">Error creating incident.</div>`;
            }
        });
    </script>
</body>
</html>
